<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Explorar Hogares - AgendaTuHogar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .card-img-top { height: 220px; object-fit: cover; }
        .precio-tag { font-size: 1.25rem; color: #198754; font-weight: bold; }
    </style>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">
    <div id="main-nav"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>

    <div class="container mt-4">
        <h2 class="mb-4">Encuentra tu próximo hogar</h2>

        <div class="row bg-white p-3 mb-4 shadow-sm rounded mx-0">
            <div class="col-md-4 mb-2 mb-md-0">
                <label class="form-label small fw-bold">Tipo de oferta</label>
                <select id="filtroTipo" class="form-select" onchange="cargarInmueblesPublicos()">
                    <option value="todos">Todos los tipos</option>
                    <option value="venta">Venta</option>
                    <option value="arriendo">Arriendo</option>
                </select>
            </div>
            <div class="col-md-4 mb-2 mb-md-0">
                <label class="form-label small fw-bold">Precio Máximo</label>
                <input type="number" id="filtroPrecio" class="form-control" placeholder="Ej: 500000" oninput="cargarInmueblesPublicos()">
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button class="btn btn-secondary w-100" onclick="limpiarFiltros()">Limpiar Filtros</button>
            </div>
        </div>

        <div id="contenedorPublico" class="row">
            </div>
    </div>

    <script>
        async function cargarInmueblesPublicos() {
    const tipo = document.getElementById('filtroTipo').value;
    const precioMax = document.getElementById('filtroPrecio').value;

    const url = `/api/inmuebles?tipo=${tipo}&precioMax=${precioMax}`;

    try {
        const res = await fetch(url);
        const inmuebles = await res.json();
        
        const contenedor = document.getElementById('contenedorPublico');
        contenedor.innerHTML = ''; 

        if (inmuebles.length === 0) {
            contenedor.innerHTML = '<div class="col-12 text-center my-5"><p class="text-muted">No encontramos inmuebles que coincidan con tu búsqueda.</p></div>';
            return;
        }

        // Usamos for...of para poder usar await dentro del bucle
        for (const inm of inmuebles) {
            
            // 1. Buscamos las fotos adicionales de este inmueble
            const resFotos = await fetch(`/api/inmuebles/${inm.id}/imagenes`);
            const galeria = await resFotos.json();

            // 2. Construimos los items del carrusel
            // La primera foto siempre es la 'portada' (la de la tabla inmuebles)
            let itemsHtml = `
                <div class="carousel-item active">
                    <img src="/uploads/${inm.imagen || 'default.jpg'}" class="d-block w-100 card-img-top" style="height:220px; object-fit:cover;">
                </div>
            `;

            // Añadimos las fotos de la galería (de la tabla inmueble_imagenes)
            galeria.forEach(foto => {
                itemsHtml += `
                    <div class="carousel-item">
                        <img src="/uploads/${foto.ruta_imagen}" class="d-block w-100 card-img-top" style="height:220px; object-fit:cover;">
                    </div>
                `;
            });

            // 3. Inyectamos la tarjeta con el carrusel integrado
            contenedor.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm border-0">
                        
                        <div id="carrusel-${inm.id}" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-inner">
                                ${itemsHtml}
                            </div>
                            ${galeria.length > 0 ? `
                                <button class="carousel-control-prev" type="button" data-bs-target="#carrusel-${inm.id}" data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                </button>
                                <button class="carousel-control-next" type="button" data-bs-target="#carrusel-${inm.id}" data-bs-slide="next">
                                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                </button>
                            ` : ''}
                        </div>
                        <div class="card-body">
                            <span class="badge bg-primary mb-2">${inm.tipo.toUpperCase()}</span>
                            <h5 class="card-title">${inm.titulo}</h5>
                            <p class="text-muted small mb-1"><i class="bi bi-geo-alt"></i> ${inm.direccion}</p>
                            <p class="precio-tag fw-bold text-success">$${Number(inm.precio).toLocaleString()}</p>
                            <button class="btn btn-outline-primary w-100" onclick="window.location.href='detalles.html?id=${inm.id}'">Ver Detalles</button>
                        </div>
                    </div>
                </div>
            `;
        }
    } catch (error) {
        console.error("Error al cargar inmuebles:", error);
    }
}

function limpiarFiltros() {
    document.getElementById('filtroTipo').value = 'todos';
    document.getElementById('filtroPrecio').value = '';
    cargarInmueblesPublicos();
}

        

        cargarInmueblesPublicos();
    </script>
</body>
</html>
