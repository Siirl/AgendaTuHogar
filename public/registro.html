<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - AgendaTuHogar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h3 class="text-center">Crear Cuenta</h3>
                <form id="formRegistro">
                    <div class="mb-3">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Contraseña</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>¿Qué buscas?</label>
                        <select id="rol" class="form-select">
                            <option value="interesado">Quiero buscar hogar</option>
                            <option value="propietario">Quiero publicar mi hogar</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarme</button>
                </form>
                <p class="mt-3 text-center"><a href="index.html">¿Ya tienes cuenta? Inicia sesión</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                rol: document.getElementById('rol').value
            };

            const res = await fetch('/api/auth/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            const data = await res.json();
            alert(data.msg);
            if (res.ok) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
