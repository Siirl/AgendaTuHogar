<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - AgendaTuHogar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .btn-explorar {
            background-color: #f8f9fa;
            border: 2px dashed #dee2e6;
            color: #6c757d;
            transition: all 0.3s;
        }
        .btn-explorar:hover {
            background-color: #e9ecef;
            border-color: #0d6efd;
            color: #0d6efd;
        }
    </style>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                
                <div class="text-center mb-4">
                    <a href="explorar.html" class="btn btn-explorar w-100 p-3">
                        <strong>¿Solo quieres mirar?</strong><br>
                        Explorar inmuebles disponibles
                    </a>
                </div>

                <div class="card p-4 shadow border-0">
                    <h3 class="text-center mb-1">Iniciar Sesión</h3>
                    <p class="text-muted text-center small mb-4">Ingresa a tu cuenta de AgendaTuHogar</p>
                    
                    <form id="formLogin">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Entrar a mi cuenta</button>
                    </form>

                    <div class="mt-4 text-center">
                        <p class="mb-1">¿No tienes cuenta? <a href="registro.html" class="text-decoration-none">Regístrate aquí</a></p>
                    </div>
                </div>
                
                <p class="text-center text-muted mt-4 small">&copy; 2026 AgendaTuHogar - Todos los derechos reservados</p>
            </div>
        </div>
    </div>

    <script>
        // Si ya hay un token, mandarlo directo al perfil o dashboard
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    // Redirigir al dashboard tras el éxito
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.msg || 'Credenciales incorrectas');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Servidor fuera de línea. Inténtalo más tarde.');
            }
        });
    </script>
</body>
</html>
