<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - AgendaTuHogar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h3 class="text-center">Iniciar Sesión</h3>
                <p class="text-muted text-center">AgendaTuHogar</p>
                <hr>
                <form id="formLogin">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="******" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <div class="mt-3 text-center">
                    <p class="small">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                    <p class="small"><a href="#" onclick="alert('Funcionalidad de correo en desarrollo. Usa Postman por ahora.')">¿Olvidaste tu contraseña?</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Si ya hay un token, mandarlo directo al perfil
        if (localStorage.getItem('token')) {
            window.location.href = 'perfil.html';
        }

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Guardamos el token y los datos básicos del usuario
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    // Redirigir al perfil
                    window.location.href = 'perfil.html';
                } else {
                    alert(data.msg || 'Error al iniciar sesión');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudo conectar con el servidor');
            }
        });
    </script>
</body>
</html>
