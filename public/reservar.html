<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva - AgendaTuHogar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div id="main-nav"></div>
    <div class="container text-center mt-5">
        <div class="card p-5 shadow-sm">
            <h2 class="text-primary">¡Ya casi es tuyo!</h2>
            <p class="lead">Estás en el proceso de reserva para el inmueble ID: <span id="id-inm"></span></p>
            <div class="alert alert-info">Página de reserva en construcción.</div>
            <a href="explorar.html" class="btn btn-link">Volver a explorar</a>
        </div>
    </div>
    <script src="js/navbar.js"></script>
    <script>
        // Validación de sesión
        if(!localStorage.getItem('token')) window.location.href = 'index.html';
        
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('id-inm').innerText = id;
    </script>
</body>
</html>
